<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Débora M. | SEO & Marketing Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Inter',sans-serif;background:#0f172a;color:#fff;line-height:1.6;}
.container{width:90%;max-width:1200px;margin:auto;}
header{min-height:100vh;display:flex;align-items:center;background:radial-gradient(circle at top right,#2563eb 0%,transparent 40%),radial-gradient(circle at bottom left,#7c3aed 0%,transparent 40%),#0f172a;}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center;}
.badge{display:inline-block;padding:8px 18px;border-radius:30px;border:1px solid rgba(255,255,255,.15);color:#60a5fa;margin-bottom:20px;}
h1{font-size:4rem;line-height:1.1;margin-bottom:20px;}
.gradient{background:linear-gradient(90deg,#60a5fa,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero p{color:#cbd5e1;font-size:1.1rem;margin-bottom:30px;}
.buttons{display:flex;gap:15px;flex-wrap:wrap;}
.btn{padding:14px 25px;border-radius:12px;text-decoration:none;font-weight:600;transition:.3s;}
.btn-primary{background:#2563eb;color:white;}
.btn-outline{border:1px solid #334155;color:white;}
.profile-card{display:flex;justify-content:center;}
.profile-photo{width:420px;max-width:100%;border-radius:30px;}
section{padding:100px 0;}
.section-title{text-align:center;margin-bottom:60px;}
.skill-card,.card,.client,.soft{background:#111c35;padding:25px;border-radius:20px;}
.skills,.clients,.soft-skills{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;}
footer{background:#020617;padding:60px 20px;text-align:center;}
footer a,.client a{color:#60a5fa;}
@media(max-width:900px){.hero{grid-template-columns:1fr;text-align:center;}h1{font-size:2.8rem;}}
</style>
</head>
<body>
<header><div class="container hero"><div><span class="badge">SEO • Conteúdo Estratégico • Marketing Digital</span><h1>Débora M.<br><span class="gradient">Conteúdo que gera visibilidade e resultados</span></h1><p>Analista de SEO com foco em estratégia de conteúdo, redação otimizada para mecanismos de busca e crescimento orgânico.</p></div><div class="profile-card"><img src="images/debora.jpg" alt="Débora M." class="profile-photo"></div></div></header>
</body></html>
